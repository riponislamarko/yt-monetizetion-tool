name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Unit + integration tests
        run: pnpm test
        env:
          NODE_ENV: test

      - name: Build
        run: pnpm build
        env:
          # web build needs the public API URL at build time; api build is a typecheck-only emit.
          NEXT_PUBLIC_API_URL: http://localhost:3001

  e2e:
    needs: build-and-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: yttoolkit }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm --filter @yt/db migrate
        env: { DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yttoolkit }
      - run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yttoolkit
          REDIS_URL: redis://localhost:6379
          IP_HASH_SALT: ci-salt
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # Auto-deploy to the VPS over SSH once CI is green on a push to main.
  # The whole stack (web + api) runs on one host via PM2; the deploy script pulls,
  # installs, migrates, rebuilds the web app, and restarts PM2.
  #
  # Required repo secrets (Settings → Secrets and variables → Actions):
  #   VPS_HOST     — server IP or hostname (e.g. 165.101.189.201)
  #   VPS_USER     — SSH user (e.g. root)
  #   VPS_SSH_KEY  — the PRIVATE deploy key (full contents, incl. BEGIN/END lines)
  #   VPS_PORT     — SSH port (optional, defaults to 22)
  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (pull · build · migrate · pm2 restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          script: |
            cd /home/devarko/htdocs/devarko.xyz/youtube-tool
            bash scripts/deploy.sh
